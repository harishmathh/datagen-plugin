# =============================================================================
# DataGen recipe — annotated reference.
# A recipe is a deterministic, declarative spec for generating one or more
# LINKED datasets. The engine reads this file and emits one CSV per dataset
# plus a validation report. Validated against engine/recipe.schema.json.
# Copy the parts you need; delete the rest. Everything is commented.
# =============================================================================

meta:
  name: my_dataset            # used for filenames / report titles
  description: One-line description of what this recipe produces.
  spec_ref: ../spec.md        # optional: the research spec this came from
  seed: 42                    # master seed -> every table/column derives its own
  version: "1.0"

# -----------------------------------------------------------------------------
# entities: shared id pools that enforce referential integrity across tables.
# A table keyed on an entity (primary_entity) gets its id column injected and,
# by default, one row per entity member. Other tables can hold foreign keys
# into the same pool (many:1) so joins line up.
# -----------------------------------------------------------------------------
entities:
  customers:
    key: customer_id          # the id column name
    count: 10000              # size of the pool
    id_format: "CUST{n:07d}"  # python format; {n} or positional {:07d}

datasets:

  # ---------------------------------------------------------------------------
  # A dataset keyed 1:1 on an entity.
  # ---------------------------------------------------------------------------
  - name: customers
    grain: one row per customer
    primary_entity: customers   # injects customer_id, defaults rows to pool size
    # rows: 10000               # override row count; or "per:customers*3"

    columns:

      # numeric: any of normal/lognormal/uniform/exponential/poisson/beta/
      # gamma/pareto/zipf/constant. min/max clip, round sets decimals.
      age:
        type: integer
        description: Customer age in years.
        distribution: {kind: normal, mean: 41, std: 14, min: 18, max: 85, round: 0}
        nullable: 0.0           # fraction set to null (missingness), optional
        # outliers: {fraction: 0.01, kind: high, magnitude: 5}  # optional

      # categorical: weights are normalized automatically.
      gender:
        type: categorical
        distribution:
          kind: categorical
          values: {Female: 0.52, Male: 0.46, Other: 0.02}

      # the "answer" column for a segmentation task; downstream tables can
      # inherit it to condition their own distributions on it.
      segment:
        type: categorical
        description: Marketing segment.
        distribution:
          kind: categorical
          values: {Premium: 0.2, Value: 0.5, Occasional: 0.3}

    constraints:
      # boolean expr that must hold per row. repair: resample|clip|drop|error.
      - {expr: "age >= 18", repair: clip}

  # ---------------------------------------------------------------------------
  # A sibling table that INHERITS a column to drive conditional distributions,
  # plus correlation and outliers.
  # ---------------------------------------------------------------------------
  - name: spendings
    grain: one row per customer
    primary_entity: customers
    inherit:
      # pull `segment` from customers (joined on customer_id) so we can
      # condition on it. keep:false -> not written to spendings.csv.
      - {from: customers, columns: [segment], keep: false}

    columns:

      annual_spend:
        type: numeric
        unit: USD
        description: Total annual spend; conditioned on segment.
        # base distribution for rows matching no `when`:
        distribution: {kind: lognormal, mean: 6.2, std: 0.5, min: 50, round: 2}
        conditional:
          - when: "segment == 'Premium'"
            distribution: {kind: normal, mean: 4200, std: 900, min: 800, round: 2}
          - when: "segment == 'Occasional'"
            distribution: {kind: normal, mean: 600, std: 250, min: 50, round: 2}
        outliers: {fraction: 0.01, kind: high, magnitude: 5}

      orders_per_year:
        type: integer
        description: Order count; positively correlated with spend.
        distribution: {kind: poisson, lam: 24, min: 1}
        # induce a target Pearson correlation with an earlier numeric column
        # (preserves this column's marginal distribution):
        correlate_with: {column: annual_spend, rho: 0.6}

    constraints:
      - {expr: "annual_spend > 0", repair: clip}

  # ---------------------------------------------------------------------------
  # Derived columns, datetimes with seasonality, faker text, and LLM text.
  # ---------------------------------------------------------------------------
  - name: orders
    grain: one row per order
    rows: "per:customers*3"     # ~3 orders per customer
    foreign_keys:
      - {column: customer_id, references: customers}   # many:1 FK

    columns:

      order_ts:
        type: datetime
        description: Order timestamp with monthly + weekday seasonality.
        distribution:
          kind: datetime_seasonal
          start: "2024-01-01"
          end: "2024-12-31"
          seasonality:
            # 12 monthly multipliers (holiday peak in Nov/Dec):
            monthly: [0.9, 0.85, 0.95, 1.0, 1.0, 0.95, 0.9, 0.95, 1.0, 1.05, 1.3, 1.5]
            # 7 weekday multipliers (Mon..Sun), weekend-heavy:
            weekday: [0.8, 0.8, 0.85, 0.9, 1.1, 1.4, 1.3]

      basket_value:
        type: numeric
        distribution: {kind: gamma, shape: 2.0, scale: 30, min: 1, round: 2}

      # derived: a safe vectorized expression over already-generated columns.
      # available helpers: where, clip, abs, log, exp, sqrt, floor, ceil,
      # minimum, maximum, randint, rand, normal, choice, isin.
      tax:
        type: derived
        depends_on: [basket_value]
        expr: "round(basket_value * 0.08, 2)"

      # faker: structured realistic text. Falls back to built-ins if Faker
      # isn't installed. provider is any Faker method (name, email, city, ...).
      ship_city:
        type: faker
        faker: {provider: city, locale: en_IN}

      # text: LLM-authored free text (Anthropic API). cardinality + conditioned_on
      # control cost: generate K distinct texts per conditioning group and
      # sample with replacement. Degrades to a placeholder offline.
      review:
        type: text
        description: Short customer review, tone varies by basket size.
        llm:
          prompt: "Write a one-sentence customer review for an order worth about {basket_value} dollars. Vary the sentiment realistically."
          conditioned_on: [basket_value]
          cardinality: 40        # 40 distinct reviews reused across rows
          max_tokens: 60

    constraints:
      - {expr: "basket_value > 0", repair: clip}
      - {expr: "tax >= 0", repair: clip}
